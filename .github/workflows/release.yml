name: Windows release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller && python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests/python -v

      - name: Verify release tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $projectVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $appVersion = python -c "from winsshui import __version__; print(__version__)"
          if ($projectVersion -ne $appVersion) {
            throw "pyproject.toml ($projectVersion) and winsshui.__version__ ($appVersion) differ"
          }
          if ("v$projectVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match project version v$projectVersion"
          }

      - name: Build EXE
        run: python -m PyInstaller --clean --noconfirm winsshui.spec

      - name: Create checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/WinSSH-UI.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  WinSSH-UI.exe" | Set-Content -Encoding ascii dist/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: WinSSH-UI-${{ github.ref_name }}
          path: |
            dist/WinSSH-UI.exe
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: >-
          gh release create "${{ github.ref_name }}"
          "dist/WinSSH-UI.exe#WinSSH-UI.exe"
          "dist/SHA256SUMS.txt#SHA256SUMS.txt"
          --verify-tag
          --generate-notes
          --title "WinSSH UI ${{ github.ref_name }}"
