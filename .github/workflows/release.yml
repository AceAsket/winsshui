name: Windows release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller && python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests/python -v

      - name: Verify release tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $projectVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $appVersion = python -c "from winsshui import __version__; print(__version__)"
          if ($projectVersion -ne $appVersion) {
            throw "pyproject.toml ($projectVersion) and winsshui.__version__ ($appVersion) differ"
          }
          if ("v$projectVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match project version v$projectVersion"
          }

      - name: Build EXE
        run: |
          python -m PyInstaller --clean --noconfirm winsshui.spec
          python -m PyInstaller --clean --noconfirm winsshui-askpass.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = python -c "from winsshui import __version__; print(__version__)"
          $compiler = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not (Test-Path $compiler)) { throw "Inno Setup compiler not found" }
          & $compiler "/DMyAppVersion=$version" installer/winsshui.iss

      - name: Create checksum
        shell: pwsh
        run: |
          $files = @("WinSSH-UI.exe", "WinSSH-AskPass.exe", "WinSSH-UI-Setup.exe")
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash "dist/$file" -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $file"
          }
          $lines | Set-Content -Encoding ascii dist/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: WinSSH-UI-${{ github.ref_name }}
          path: |
            dist/WinSSH-UI.exe
            dist/WinSSH-AskPass.exe
            dist/WinSSH-UI-Setup.exe
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: >-
          gh release create "${{ github.ref_name }}"
          "dist/WinSSH-UI.exe#WinSSH-UI.exe"
          "dist/WinSSH-AskPass.exe#WinSSH-AskPass.exe"
          "dist/WinSSH-UI-Setup.exe#WinSSH-UI-Setup.exe"
          "dist/SHA256SUMS.txt#SHA256SUMS.txt"
          --verify-tag
          --generate-notes
          --title "WinSSH UI ${{ github.ref_name }}"
